project:
  name: "social-anomaly-clustering"
  random_state: 42

data:
  raw_path: "datasets/raw/bot_detection_data.csv"
  cleaned_path: "datasets/cleaned/bot_detection_clean.csv"
  features_path: "datasets/processed/user_features.csv"
  scaled_features_path: "datasets/processed/user_features_scaled.csv"
  features_with_label_path: "datasets/processed/user_features_with_label.csv"

columns:
  raw:
    user_id: "User ID"
    username: "Username"
    tweet: "Tweet"
    retweet_count: "Retweet Count"
    mention_count: "Mention Count"
    follower_count: "Follower Count"
    verified: "Verified"
    bot_label: "Bot Label"
    location: "Location"
    created_at: "Created At"
    hashtags: "Hashtags"

  cleaned:
    id_column: "user_id"
    target_column: "bot_label"
    text_column: "tweet"
    date_column: "created_at"

preprocessing:
  fill_missing_hashtags: true
  fill_missing_hashtags_value: ""
  convert_verified_to_int: true
  parse_datetime: true
  drop_duplicates: true

feature_engineering:
  use_columns:
    - "retweet_count"
    - "mention_count"
    - "follower_count"
    - "verified"
    - "tweet_length"
    - "hashtag_count"
    - "has_hashtag"
    - "has_location"
    - "username_length"
    - "account_age_days"

  text_features:
    tweet_length: true
    username_length: true
    hashtag_count: true
    has_hashtag: true
    has_location: true

  log_transform:
    enabled: true
    columns:
      - "retweet_count"
      - "mention_count"
      - "follower_count"

scaling:
  method: "standard_scaler"

clustering:
  kmeans:
    n_clusters: 3
    random_state: 42
    n_init: 10

  dbscan:
    eps: 1.5
    min_samples: 5

evaluation:
  use_label_for_evaluation_only: true
  label_column: "bot_label"
  anomaly_percentile: 95

pca:
  n_components: 2
  random_state: 42

results:
  model_dir: "results/models"
  csv_dir: "results/csv"
  figure_dir: "results/figures"
  log_dir: "results/logs"